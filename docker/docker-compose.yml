services:
  debroxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: debroxy
    ports:
      - "8888:8888"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/debroxy.db
    volumes:
      - debroxy-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  debroxy-data:
    driver: local
